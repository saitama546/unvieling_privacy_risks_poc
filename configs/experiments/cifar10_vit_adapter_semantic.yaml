```yaml
experiment:
  name: cifar10_vit_adapter_semantic
  seed: 0
  output_dir: results/cifar10_vit_adapter_semantic_seed0

dataset:
  source: huggingface
  name: cifar10
  hf_path: uoft-cs/cifar10
  train_split: train
  image_column: img
  label_column: label

  image_size: 224
  num_clients: 2
  batch_size: 1
  num_workers: 2
  split: iid
  shuffle: true

model:
  backbone: vit_tiny_patch16_224
  pretrained: true
  num_classes: auto
  freeze_backbone: true

peft:
  method: adapter
  bottleneck_dim: 64

fl:
  protocol: fedsgd
  num_rounds: 1
  clients_per_round: 1
  local_epochs: 1
  local_lr: 0.001
  share: adapter_gradients

attack:
  enabled: true
  modes:
    - gradient_only
    - gradient_correct_query
    - gradient_wrong_query
    - text_only
  steps: 10000
  lr: 0.1
  lambda_grad: 1.0
  lambda_clip: 0.01
  lambda_tv: 0.001
  init: random_noise

queries:
  correct: "a photo of a frog"
  wrong: "a photo of a truck"

metrics:
  - psnr
  - ssim
  - lpips
  - gradient_loss
  - clip_similarity
```
